        .form-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; display: block; font-weight: 600; letter-spacing: 0.3px; }
        .form-input, .form-select, .form-textarea { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 11px 14px; color: var(--text-primary); font-family: 'Cairo', sans-serif; font-size: 13px; outline: none; transition: var(--transition); }
        .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--black); box-shadow: 0 0 0 3px rgba(26, 26, 26, 0.08); }
        .form-textarea { resize: vertical; min-height: 80px; }
        .form-input::placeholder { color: var(--text-muted); opacity: 0.7; }
        .btn { padding: 10px 20px; border-radius: var(--radius-sm); border: none; font-family: 'Cairo', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: var(--transition); letter-spacing: 0.3px; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
        .btn-primary { background: var(--black); color: var(--white); }
        .btn-primary:hover { background: #333; box-shadow: var(--shadow); transform: translateY(-1px); }
        .btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
        .btn-ghost:hover { border-color: var(--black); color: var(--black); background: rgba(26,26,26,0.04); }
        .btn-sm { padding: 6px 14px; font-size: 11px; border-radius: 6px; }
        .btn-success { background: var(--green); color: var(--white); font-weight: 700; }
        .btn-success:hover { background: #388e3c; box-shadow: 0 4px 16px rgba(46,125,50,0.2); }
        .btn-danger { background: var(--red); color: var(--white); font-weight: 700; }
        .btn-danger:hover { background: #d32f2f; box-shadow: 0 4px 16px rgba(198,40,40,0.2); }
        .btn-outline-orange { background: transparent; border: 1.5px solid var(--orange); color: var(--orange); }
        .btn-outline-orange:hover { background: var(--orange-glow); }
        .btn-lg { padding: 14px 28px; font-size: 15px; border-radius: var(--radius); }
        .btn-block { width: 100%; justify-content: center; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
        .badge { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 0.3px; }
        .badge-pending { background: var(--amber-glow); color: var(--amber); }
        .badge-assigned { background: var(--blue-glow); color: var(--blue); }
        .badge-picked { background: rgba(156,39,176,0.1); color: #9c27b0; }
        .badge-transit { background: rgba(0,150,136,0.1); color: #009688; }
        .badge-delivered { background: var(--green-glow); color: var(--green); }
        .badge-returned { background: var(--red-glow); color: var(--red); }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
        .nav { background: var(--bg-secondary); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 62px; position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Outfit', sans-serif; font-size: 26px; font-weight: 900; letter-spacing: 2px; color: var(--black); line-height: 1; text-transform: uppercase; }
        .logo span { color: var(--orange); }
        .nav-info { font-size: 11px; color: var(--text-muted); letter-spacing: 0.3px; }
        .nav-user { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--black); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 15px; color: var(--white); flex-shrink: 0; }
        .tabs { display: flex; background: var(--bg-secondary); border-bottom: 1px solid var(--border); overflow-x: auto; gap: 2px; padding: 0 20px; }
        .tab { padding: 15px 22px; font-size: 13px; font-family: 'Cairo', sans-serif; font-weight: 600; background: none; border: none; color: var(--text-muted); cursor: pointer; white-space: nowrap; border-bottom: 3px solid transparent; transition: var(--transition); letter-spacing: 0.3px; }
        .tab:hover { color: var(--text-primary); }
        .tab.active { color: var(--black); border-bottom-color: var(--black); font-weight: 700; }
        .main { flex: 1; padding: 24px; max-width: 1160px; margin: 0 auto; width: 100%; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; position: relative; overflow: hidden; transition: var(--transition); cursor: default; }
        .stat-card:hover { border-color: var(--border-light); box-shadow: var(--shadow); transform: translateY(-2px); }
        .stat-card::after { content: ''; position: absolute; top: 0; right: 0; width: 4px; height: 100%; background: var(--black); border-radius: 0 4px 4px 0; }
        .stat-icon { font-size: 24px; margin-bottom: 6px; }
        .stat-num { font-size: 34px; font-weight: 900; color: var(--black); line-height: 1; font-family: 'Outfit', sans-serif; letter-spacing: 1px; }
        .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; letter-spacing: 0.3px; }
        .stat-card.green::after { background: var(--green); }
        .stat-card.warn::after { background: var(--amber); }
        .stat-card.blue::after { background: var(--blue); }
        .sec-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
        .sec-title { font-size: 18px; font-weight: 800; color: var(--black); letter-spacing: 0.3px; font-family: 'Outfit', sans-serif; }
        .table-wrap { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--bg-elevated); padding: 13px 16px; font-size: 11px; color: var(--text-muted); font-weight: 700; text-align: right; border-bottom: 1px solid var(--border); letter-spacing: 0.5px; text-transform: uppercase; }
        td { padding: 14px 16px; font-size: 13px; border-bottom: 1px solid rgba(0,0,0,0.03); vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(0,0,0,0.01); }
        .td-id { color: var(--orange); font-weight: 700; font-size: 12px; letter-spacing: 0.5px; font-family: 'Outfit', sans-serif; }
        .td-customer { font-weight: 600; color: var(--text-primary); }
        .td-sub { font-size: 11px; color: var(--text-muted); }
        .td-amount { font-weight: 700; color: var(--green); font-family: 'Outfit', sans-serif; letter-spacing: 0.5px; }
        .td-note { font-size: 11px; color: var(--orange); font-weight: 600; background: var(--orange-glow); padding: 2px 8px; border-radius: 4px; display: inline-block; }
        .filter-bar { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
        .filter-select, .filter-input { background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 14px; color: var(--text-primary); font-family: 'Cairo', sans-serif; font-size: 13px; outline: none; transition: var(--transition); }
        .filter-input { flex: 1; min-width: 200px; }
        .filter-select:focus, .filter-input:focus { border-color: var(--black); box-shadow: 0 0 0 3px rgba(26,26,26,0.08); }
        .overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 20px; backdrop-filter: blur(4px); animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 32px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-xl); animation: slideUp 0.25s ease; }
        .modal-title { font-size: 20px; font-weight: 800; margin-bottom: 20px; color: var(--black); font-family: 'Outfit', sans-serif; letter-spacing: 0.5px; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
        .reason-list { display: flex; flex-direction: column; gap: 8px; }
        .reason-item { padding: 13px 16px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--bg-input); cursor: pointer; font-size: 13px; transition: var(--transition); display: flex; align-items: center; gap: 12px; font-weight: 500; }
        .reason-item:hover { border-color: var(--black); background: rgba(26,26,26,0.04); }
        .reason-item.selected { border-color: var(--black); background: rgba(26,26,26,0.06); color: var(--black); font-weight: 700; }
        .radio { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; transition: var(--transition); }
        .radio.checked { border-color: var(--black); background: var(--black); box-shadow: 0 0 0 4px rgba(26,26,26,0.1); }
        .courier-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
        .courier-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; display: flex; flex-direction: column; gap: 10px; transition: var(--transition); }
        .courier-card:hover { border-color: var(--border-light); box-shadow: var(--shadow); transform: translateY(-1px); }
        .courier-name { font-weight: 800; font-size: 16px; color: var(--black); }
        .courier-info { font-size: 12px; color: var(--text-muted); }
        .courier-stats { display: flex; gap: 14px; font-size: 12px; margin-top: 4px; }
        .courier-stat { font-weight: 700; }
        .courier-stat.green { color: var(--green); }
        .courier-stat.red { color: var(--red); }
        .courier-stat.blue { color: var(--blue); }
        .courier-app { min-height: 100vh; background: var(--bg-primary); display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; box-shadow: 0 0 40px rgba(0,0,0,0.06); }
        .courier-header { background: var(--bg-secondary); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
        .courier-logo { font-family: 'Outfit', sans-serif; font-size: 22px; font-weight: 900; letter-spacing: 2px; color: var(--black); text-transform: uppercase; }
        .courier-logo span { color: var(--orange); }
        .courier-summary-strip { background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; gap: 20px; flex-wrap: wrap; }
        .summary-item { display: flex; flex-direction: column; }
        .summary-label { font-size: 10px; color: var(--text-muted); letter-spacing: 0.5px; text-transform: uppercase; }
        .summary-value { font-size: 20px; font-weight: 900; font-family: 'Outfit', sans-serif; letter-spacing: 1px; }
        .summary-value.orange { color: var(--orange); }
        .summary-value.green { color: var(--green); }
        .summary-value.blue { color: var(--blue); }
        .summary-divider { width: 1px; background: var(--border); flex-shrink: 0; }
        .courier-body { flex: 1; padding: 16px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
        .order-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px; display: flex; flex-direction: column; gap: 12px; transition: var(--transition); }
        .order-card:hover { border-color: var(--border-light); box-shadow: var(--shadow); }
        .order-card-header { display: flex; justify-content: space-between; align-items: center; }
        .order-id-text { font-size: 12px; color: var(--orange); font-weight: 700; letter-spacing: 1px; font-family: 'Outfit', sans-serif; }
        .order-customer-name { font-size: 17px; font-weight: 800; color: var(--black); }
        .order-address-line { font-size: 13px; color: var(--text-secondary); }
        .order-desc { font-size: 12px; color: var(--text-muted); }
        .order-note { font-size: 12px; color: var(--orange); background: var(--orange-glow); padding: 8px 12px; border-radius: 6px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .order-bottom { display: flex; justify-content: space-between; align-items: center; }
        .order-amount-big { font-size: 22px; font-weight: 900; color: var(--green); font-family: 'Outfit', sans-serif; letter-spacing: 1px; }
        .order-phone a { font-size: 13px; color: var(--blue); text-decoration: none; font-weight: 600; }
        .order-actions-row { display: flex; gap: 8px; }
        .order-actions-row .btn { flex: 1; justify-content: center; font-size: 13px; padding: 11px 16px; }
        .return-reason-tag { font-size: 12px; color: var(--red); background: var(--red-glow); padding: 8px 12px; border-radius: 6px; font-weight: 600; }
        .bottom-nav { background: var(--bg-secondary); border-top: 1px solid var(--border); display: flex; padding: 6px 0 2px; }
        .bottom-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; background: none; border: none; color: var(--text-muted); font-family: 'Cairo', sans-serif; font-size: 10px; cursor: pointer; padding: 6px 0; transition: var(--transition); font-weight: 600; }
        .bottom-btn.active { color: var(--black); }
        .bottom-icon { font-size: 22px; line-height: 1; }
        .alert { padding: 12px 16px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 16px; border: 1px solid; font-weight: 600; }
        .alert-success { background: var(--green-glow); border-color: var(--green); color: var(--green); }
        .alert-error { background: var(--red-glow); border-color: var(--red); color: var(--red); }
        .empty { text-align: center; padding: 56px 20px; color: var(--text-muted); font-size: 15px; }
        .empty-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.6; }
        .progress-bar-wrap { flex: 1; background: var(--bg-input); border-radius: 6px; height: 8px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--green); border-radius: 6px; transition: width 0.5s ease; }
        .progress-percent { font-size: 12px; color: var(--text-muted); min-width: 38px; text-align: left; font-weight: 700; }
        .qr-wrap { display: flex; justify-content: center; padding: 20px 0; }
        .qr-wrap img { border-radius: 12px; border: 2px solid var(--border); }
        .info-row { display: flex; align-items: flex-start; gap: 8px; padding: 6px 0; font-size: 13px; }
        .info-label { color: var(--text-muted); min-width: 70px; font-weight: 600; }
        .info-value { color: var(--text-primary); font-weight: 500; flex: 1; }
        .nav-address-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--black); color: var(--white); border-radius: var(--radius-sm); text-decoration: none; font-size: 13px; font-weight: 700; font-family: 'Cairo', sans-serif; border: none; cursor: pointer; transition: var(--transition); }
        .nav-address-btn:hover { background: #333; transform: translateY(-1px); }
        @media (max-width: 768px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
            .main { padding: 16px; }
            .modal { padding: 24px 18px; max-width: 95vw; }
            .nav { padding: 0 14px; }
            .courier-app { max-width: 100%; box-shadow: none; }
            .courier-summary-strip { gap: 12px; padding: 12px 14px; }
            .summary-value { font-size: 16px; }
            th, td { padding: 10px 10px; font-size: 11px; }
            .sec-title { font-size: 16px; }
        }
        @media (max-width: 420px) {
            .stats { grid-template-columns: 1fr 1fr; gap: 8px; }
            .stat-num { font-size: 26px; }
            .stat-card { padding: 14px; }
            .login-card { padding: 28px 18px; }
            .login-logo { font-size: 40px; }
        }
        @media print {
            .no-print { display: none !important; }
            body { background: white; }
        }
        .location-input-group { display: flex; gap: 8px; }
        .location-input-group .form-input { flex: 1; }
        .loc-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; display: flex; align-items: center; gap: 4px; }

            function generateQRData(order) {
                var data = {
                    id: order.id,
                    addr: order.address,
                    cust: order.customer,
                    phone: order.phone,
                    area: order.area,
                    desc: order.description,
                    amount: order.amount,
                    notes: order.notes || "",
                    status: order.status
                };
                if (order.lat && order.lng) { data.lat = order.lat; data.lng = order.lng; }
                return JSON.stringify(data);
            }

            function parseQRData(str) {
                try { return JSON.parse(str); } catch(e) { return null; }
            }

            function parseLocationInput(val) {
                if (!val || !val.trim()) return {lat: null, lng: null};
                var s = val.trim();
                var lat, lng;
                var m = s.match(/[-+]?(\d+\.?\d*)/g);
                if (m && m.length >= 2) {
                    lat = parseFloat(m[0]);
                    lng = parseFloat(m[1]);
                    if (!isNaN(lat) && !isNaN(lng) && lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180) {
                        return {lat: lat, lng: lng};
                    }
                }
                m = s.match(/@([-+]?\d+\.?\d*),([-+]?\d+\.?\d*)/);
                if (m) {
                    lat = parseFloat(m[1]); lng = parseFloat(m[2]);
                    if (!isNaN(lat) && !isNaN(lng)) return {lat: lat, lng: lng};
                }
                m = s.match(/q=([-+]?\d+\.?\d*),([-+]?\d+\.?\d*)/);
                if (m) {
                    lat = parseFloat(m[1]); lng = parseFloat(m[2]);
                    if (!isNaN(lat) && !isNaN(lng)) return {lat: lat, lng: lng};
                }
                return {lat: null, lng: null};
            }
